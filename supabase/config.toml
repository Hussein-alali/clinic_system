# Supabase project config (for the CLI: `supabase link` / `supabase db push`).
# The project ref is read from `supabase link --project-ref <ref>`; this file
# only needs to exist for the CLI to recognize the folder as a Supabase project.
project_id = "kinetic-clinic"

[db]
# Local dev Postgres port (only used by `supabase start`).
port = 54322
major_version = 15

[auth]
# Turn OFF email confirmation so admin-created staff can log in immediately.
# Match this in the hosted project: Authentication → Providers → Email.
enable_confirmations = false
